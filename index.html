<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAO Performers' Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clsu: { green: '#006633', gold: '#FFC000' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="h-full text-slate-100 antialiased overflow-hidden flex flex-col font-sans selection:bg-clsu-green selection:text-white">

    <div id="auth-page" class="flex-1 flex flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-950 via-slate-900 to-clsu-green/20 relative z-10">
        <div class="w-full max-w-sm bg-slate-900/90 backdrop-blur-xl p-8 rounded-3xl border border-slate-700/60 shadow-2xl relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-clsu-green rounded-full blur-3xl opacity-30 pointer-events-none"></div>
            
            <div class="text-center mb-8 relative z-10">
                <div class="w-16 h-16 bg-clsu-green text-clsu-gold rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-clsu-green/30 border border-clsu-gold/20">
                    <i class="ph-bold ph-star text-3xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight text-white">Performers' Hub</h1>
                <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider font-semibold">Cultural Affairs Office • CLSU</p>
            </div>

            <!-- Error Notification Banner -->
            <div id="auth-error" class="hidden mb-4 p-3 bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs rounded-xl text-center font-medium"></div>

            <!-- Form Elements -->
            <div class="space-y-4 relative z-10">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Student ID</label>
                    <input type="text" id="auth-id" placeholder="e.g. 24-2094" class="w-full bg-slate-950 border border-slate-700/80 rounded-xl px-4 py-3 text-slate-200 font-mono focus:outline-none focus:border-clsu-gold transition text-sm">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">4-Digit PIN</label>
                    <input type="password" id="auth-pin" placeholder="••••" maxlength="4" class="w-full bg-slate-950 border border-slate-700/80 rounded-xl px-4 py-3 text-slate-200 font-mono tracking-[0.5em] focus:outline-none focus:border-clsu-gold transition text-center text-lg">
                </div>
                
                <div class="pt-2 flex gap-3">
                    <button onclick="handleAuth('login')" id="btn-login" class="flex-1 bg-clsu-green hover:bg-green-800 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-clsu-green/20 text-sm">Login</button>
                    <button onclick="handleAuth('register')" id="btn-register" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition border border-slate-700 text-sm">Register</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="hidden flex-1 flex-col h-full bg-slate-950 overflow-y-auto">
        <!-- Dashboard Navigation Header -->
        <header class="bg-slate-900/90 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between sticky top-0 z-20 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-clsu-green/20 border border-clsu-green/40 flex items-center justify-center text-clsu-gold">
                    <i class="ph-bold ph-shield-check text-xl"></i>
                </div>
                <div>
                    <h2 class="text-base font-black text-white leading-tight">Performers' Hub</h2>
                    <p id="dash-group" class="text-xs text-clsu-gold font-semibold">Umbrella Group</p>
                </div>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 hover:text-rose-400 transition border border-slate-700">
                <i class="ph-bold ph-sign-out text-lg"></i>
            </button>
        </header>

        <main class="p-4 sm:p-6 space-y-6 max-w-xl mx-auto w-full pb-20">
            
            <div class="bg-gradient-to-br from-clsu-green via-green-900 to-slate-900 rounded-3xl p-6 relative overflow-hidden shadow-2xl border border-clsu-green/30">
                <i class="ph-duotone ph-sparkle absolute -top-6 -right-6 text-9xl text-white/10 pointer-events-none"></i>
                
                <h1 id="dash-name" class="text-2xl font-black text-white relative z-10 leading-tight">Student Name</h1>
                <p id="dash-id" class="text-green-300 font-mono text-xs relative z-10 mb-6">ID: ----</p>
                
                <div class="relative z-10 bg-slate-950/60 rounded-2xl p-4 backdrop-blur-md border border-white/10">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p class="text-[10px] text-green-300 font-bold uppercase tracking-wider">Performer Rank</p>
                            <p id="dash-level" class="text-base font-black text-clsu-gold">Level 1: Novice</p>
                        </div>
                        <p class="text-sm font-black text-white"><span id="dash-xp">0</span> <span class="text-green-400 text-xs font-normal">XP</span></p>
                    </div>
                    <!-- XP Progress Bar -->
                    <div class="w-full bg-slate-900/80 rounded-full h-3 mb-1 overflow-hidden border border-white/10">
                        <div id="dash-progress" class="bg-gradient-to-r from-clsu-gold to-amber-300 h-3 rounded-full transition-all duration-1000 w-0"></div>
                    </div>
                    <p class="text-[10px] text-right text-slate-400">Next rank tier at <span id="dash-xp-next" class="text-slate-200 font-bold">200</span> XP</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center text-center">
                    <i class="ph-duotone ph-clock text-3xl text-sky-400 mb-1"></i>
                    <p id="dash-hours" class="text-2xl font-black text-white">0.00</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Rehearsal Hours</p>
                </div>
                <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center text-center">
                    <i class="ph-duotone ph-trophy text-3xl text-clsu-gold mb-1"></i>
                    <p id="dash-unlocked-count" class="text-2xl font-black text-white">0 / 0</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Badges Unlocked</p>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-1 flex items-center gap-2">
                    <i class="ph-bold ph-medal text-clsu-gold"></i> Achievements Matrix
                </h3>
                <div class="grid grid-cols-2 gap-3" id="badges-container">
                    <!-- Dynamic badges injected via JS -->
                </div>
            </div>

            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-1 flex items-center gap-2">
                    <i class="ph-bold ph-list-dashes text-sky-400"></i> Recent Rehearsal Logs
                </h3>
                <div class="bg-slate-900/80 border border-slate-800/80 rounded-2xl overflow-hidden divide-y divide-slate-800/60" id="recent-logs-container">
                    <!-- Dynamic logs injected via JS -->
                </div>
            </div>
        </main>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 hidden items-center justify-center flex-col">
        <div class="w-12 h-12 border-4 border-slate-800 border-t-clsu-gold rounded-full animate-spin mb-4"></div>
        <p id="loading-text" class="text-slate-300 text-xs font-semibold animate-pulse tracking-wide">Connecting to Server...</p>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbznNwXNO4b4hTp5XPcM07nCBGjkLgP3f-h3erVDQt-XiHTWLVH4qMneeG5-s6QKUIny/exec";

        window.onload = () => {
            const savedId = localStorage.getItem('cao_student_id');
            if (savedId) {
                loadDashboard(savedId);
            }
        };

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-overlay').classList.add('flex');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('flex');
        }

        function showError(msg) {
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = msg;
            errDiv.classList.remove('hidden');
            setTimeout(() => errDiv.classList.add('hidden'), 4000);
        }

        async function handleAuth(type) {
            const id = document.getElementById('auth-id').value.trim();
            const pin = document.getElementById('auth-pin').value.trim();
            
            if (!id || !pin || pin.length < 4) {
                showError("Enter a valid Student ID and 4-digit PIN.");
                return;
            }

            showLoading(type === 'login' ? "Authenticating..." : "Registering PIN...");
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: type, id: id, pin: pin })
                });
                
                const resData = await response.json();

                if (resData.success) {
                    loadDashboard(id);
                } else {
                    hideLoading();
                    showError(resData.message || "Authentication failed.");
                }
            } catch (err) {
                hideLoading();
                showError("Network Error. Please try again.");
            }
        }

        async function loadDashboard(studentId) {
            showLoading("Syncing profile & badges...");
            
            try {
                const response = await fetch(`${WEB_APP_URL}?requestType=dashboard&id=${encodeURIComponent(studentId)}`);
                const data = await response.json();
                
                if (data.error) {
                    hideLoading();
                    localStorage.removeItem('cao_student_id');
                    showError("Student ID not found.");
                    return;
                }

                // Save session
                localStorage.setItem('cao_student_id', studentId);
                
                // Populate Profile
                document.getElementById('dash-name').innerText = data.name;
                document.getElementById('dash-id').innerText = `ID: ${data.id}`;
                document.getElementById('dash-group').innerText = data.group;
                
                // Stats
                const stats = data.stats;
                document.getElementById('dash-hours').innerText = stats.hours;
                document.getElementById('dash-xp').innerText = stats.xp;
                document.getElementById('dash-xp-next').innerText = stats.xpNextLevel;
                document.getElementById('dash-progress').style.width = `${stats.xpProgress}%`;
                
                const titles = ["Novice Artist", "Apprentice Performer", "Dedicated Member", "Section Virtuoso", "CAO Legend"];
                const titleIndex = Math.min(stats.level - 1, 4);
                document.getElementById('dash-level').innerText = `Level ${stats.level}: ${titles[titleIndex]}`;

                // Render Badges & Activity
                renderBadges(data.achievements);
                renderLogs(data.logs);

                // Switch Page View
                hideLoading();
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('dashboard-page').classList.add('flex');

            } catch (err) {
                hideLoading();
                showError("Failed to fetch dashboard data.");
            }
        }

        function renderBadges(achievements) {
            const container = document.getElementById('badges-container');
            container.innerHTML = '';
            
            let unlockedCount = 0;

            achievements.forEach(ach => {
                if (ach.unlocked) unlockedCount++;

                const style = ach.unlocked 
                    ? "bg-emerald-500/10 border-emerald-500/30 text-emerald-400" 
                    : "bg-slate-900/50 border-slate-800 text-slate-600 opacity-60";
                
                // Clean phosphor icon string if combined with emoji
                const iconClass = ach.icon.split(' ')[0] || "ph-star";

                container.innerHTML += `
                    <div class="border rounded-2xl p-3 flex items-center gap-3 transition ${style}">
                        <div class="w-10 h-10 rounded-xl bg-slate-950 flex items-center justify-center shrink-0 border border-white/5">
                            <i class="ph-duotone ${iconClass} text-xl"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-xs font-bold text-slate-200 truncate">${ach.title}</p>
                            <p class="text-[10px] text-slate-400 line-clamp-1">${ach.desc}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('dash-unlocked-count').innerText = `${unlockedCount} / ${achievements.length}`;
        }

        function renderLogs(logs) {
            const container = document.getElementById('recent-logs-container');
            container.innerHTML = '';
            
            if (!logs || logs.length === 0) {
                container.innerHTML = '<p class="text-xs text-center text-slate-500 p-6">No recent activity logs found.</p>';
                return;
            }

            logs.forEach(log => {
                const color = log.action === 'Time IN' ? 'text-sky-400' : 'text-emerald-400';
                const icon = log.action === 'Time IN' ? 'ph-sign-in' : 'ph-sign-out';
                const durationBadge = log.duration && log.duration !== "-" ? `<span class="text-emerald-400 font-mono">+${log.duration} hrs</span>` : '';

                container.innerHTML += `
                    <div class="p-3.5 flex items-center justify-between text-xs">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800">
                                <i class="ph-bold ${icon} ${color}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-200">${log.action}</p>
                                <p class="text-[10px] text-slate-500 font-mono">${log.date}</p>
                            </div>
                        </div>
                        <div class="font-bold">
                            ${durationBadge}
                        </div>
                    </div>
                `;
            });
        }

        function logout() {
            localStorage.removeItem('cao_student_id');
            document.getElementById('auth-id').value = '';
            document.getElementById('auth-pin').value = '';
            document.getElementById('dashboard-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('flex');
            document.getElementById('auth-page').classList.remove('hidden');
            document.getElementById('auth-page').classList.add('flex');
        }
    </script>
</body>
</html>
